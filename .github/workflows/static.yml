name: Deploy variationTable to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write # Essential for pushing to the gh-pages branch
  pages: write    # Signals this is a GitHub Pages job
  id-token: write # Required for modern secure OIDC authentication

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # IMPORTANT: Use 'dist' if you use Vite, or 'build' if you use Create React App
          folder: dist 
          branch: gh-pages
